<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ISO Standard Child Safety ID Card</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* ── INTERACTIVE CONTROLS (Hidden during print) ── */
  #controls {
    margin: 20px auto;
    width: 540px;
    text-align: center;
    background: #0B2D5B;
    padding: 20px;
    border-radius: 15px;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 20px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
  }
  #controls select, #controls button {
    padding: 10px 20px;
    font-family: 'Fredoka', sans-serif;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
    border: none;
  }
  #controls button { background-color: #C62828; color: white; font-weight: 600; }

  /* ── ISO CR80 PRINT ENGINE (Digital to Physical Scaling) ── */
  @media print {
    @page { size: 85.6mm 53.98mm; margin: 0; }
    html, body { width: 85.6mm; height: 53.98mm; margin: 0; padding: 0; background: #fff; overflow: hidden; }
    #controls { display: none !important; }
    
    .print-guide {
      border: none !important;
      position: absolute;
      top: 0; left: 0;
      width: 540px !important;
      height: 856px !important;
      transform: scale(0.1585); 
      transform-origin: top left;
    }
    .id-card { box-shadow: none !important; border-radius: 0 !important; }
  }

  /* ── SCREEN VIEW ── */
  body { background-color: #f0f2f5; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; font-family: 'Fredoka', sans-serif; }
  .print-guide { width: 540px; height: 856px; background: #fff; display: flex; justify-content: center; align-items: center; border: 2px dashed #ccc; box-sizing: border-box; }
  .id-card { width: 100%; height: 100%; background-color: #ffffff; border-radius: 40px; overflow: hidden; display: flex; flex-direction: column; position: relative; -webkit-print-color-adjust: exact; print-color-adjust: exact; }

  /* Header */
  .header { height: 16%; background-color: #0B2D5B; position: relative; display: flex; align-items: flex-end; justify-content: center; padding-bottom: 25px; }
  .red-triangle { position: absolute; top: 0; left: 0; width: 0; height: 0; border-top: 80px solid #C62828; border-right: 80px solid transparent; }
  .header h1 { color: #ffffff; font-weight: 600; text-transform: uppercase; font-size: 49px; margin: 0; letter-spacing: 2px; }

  /* Body */
  .main-body { display: flex; flex: 1; padding: 25px 20px 10px 20px; }
  .left-column { width: 70%; display: flex; padding-right: 15px; }
  .left-column img { width: 100%; height: 100%; object-fit: cover; border-radius: 30px; background-color: #f0f0f0; }
  
  .right-column { width: 30%; display: flex; flex-direction: column; justify-content: space-around; }
  .info-block { text-align: center; }
  .info-label { font-size: 15px; font-weight: 500; color: #0B2D5B; background: #E8EEF5; display: inline-block; padding: 3px 14px; border-radius: 12px; }
  .info-value { font-size: 19px; font-weight: 600; color: #111; display: flex; align-items: center; justify-content: center; gap: 8px; }

  /* Medical Panel */
  .medical-panel { height: 110px; margin: 0 20px 20px 20px; border: 3px solid #9EC3E6; border-radius: 25px; display: flex; background-color: #FBFCFE; padding-top: 8px; }
  .med-column { flex: 1; display: flex; flex-direction: column; align-items: center; text-align: center; padding: 5px; overflow: hidden; }
  .med-divider { width: 3px; background-color: #9EC3E6; height: 70%; align-self: center; border-radius: 3px; }
  .med-label { font-size: 16px; font-weight: 500; color: #666; }
  .med-value { font-weight: 700; line-height: 1; margin-top: 2px; white-space: nowrap; }
  .med-value.blood { color: #C62828; font-size: 38px; }

  /* Footer - Optimized for Data Matrix */
  .footer { height: 20%; background-color: #C62828; display: flex; align-items: center; padding: 10px 30px; box-sizing: border-box; }
  .footer-qr-side { display: flex; align-items: center; justify-content: center; width: 145px; }
  .footer-qr-box { 
    width: 135px; 
    height: 135px; 
    background: white; 
    border-radius: 8px; 
    padding: 12px; 
    box-sizing: border-box;
    display: flex;
    justify-content: center;
    align-items: center;
  }
  .footer-qr-box img { width: 100%; height: 100%; image-rendering: pixelated; }

  .footer-text-side { flex: 1; display: flex; flex-direction: column; align-items: center; text-align: center; color: white; padding-left: 10px; }
  .footer-label { font-size: 20px; font-weight: 500; margin-bottom: 4px; }
  .footer-number { font-size: 44px; font-weight: 700; line-height: 1; }
</style>
</head>
<body>

<div id="controls">
    <div>
      <label for="childSelect" style="font-weight: 600; margin-right: 10px;">Select Profile:</label>
      <select id="childSelect">
          <option value="vihanna">Vihanna</option>
          <option value="jashnika">Jashnika</option>
      </select>
    </div>
    <button onclick="window.print()">Print ISO Card</button>
</div>

<div class="print-guide">
  <div class="id-card">
    <div class="header">
      <div class="red-triangle"></div>
      <h1 id="card-name">VIHANNA N</h1>
    </div>

    <div class="main-body">
      <div class="left-column">
        <img id="card-photo" src="VihannaId-1.jpg" alt="Child Photo">
      </div>
      <div class="right-column">
        <div class="info-block">
          <div class="info-label">Born On</div>
          <div id="card-dob" class="info-value">JUL 30, 2016</div>
        </div>
        <div class="info-block">
          <div class="info-label">Nationality</div>
          <div id="card-nationality" class="info-value">
            Indian <img style="width:22px;" src="https://upload.wikimedia.org/wikipedia/en/4/41/Flag_of_India.svg">
          </div>
        </div>
        <div class="info-block">
          <div class="info-label">Languages</div>
          <div id="card-langs" class="info-value">English & Telugu</div>
        </div>
      </div>
    </div>

    <div class="medical-panel">
      <div class="med-column"><div class="med-label">Blood Type</div><div id="card-blood" class="med-value blood">B+</div></div>
      <div class="med-divider"></div>
      <div class="med-column"><div class="med-label">Allergy</div><div id="card-allergy" class="med-value" style="color:#111">None</div></div>
      <div class="med-divider"></div>
      <div class="med-column"><div class="med-label">Diet</div><div id="card-diet" class="med-value">Vegan</div></div>
    </div>

    <div class="footer">
      <div class="footer-qr-side">
        <div class="footer-qr-box">
          <img id="card-qr" src="https://barcode.tec-it.com/barcode.ashx?data=https%3A%2F%2Famareswar-n.github.io%2Fstatic-assets%2Fresources%2Fv-id-8f72a9b4.html&code=DataMatrix&multiplebarcodes=true&translate-esc=on&dmsize=Default" alt="Data Matrix">
        </div>
      </div>
      <div class="footer-text-side">
        <div id="card-emergency-label" class="footer-label">EMERGENCY (Call Dad)</div>
        <div id="card-phone" class="footer-number">+61 468 467 031</div>
      </div>
    </div>
  </div>
</div>

<script>
    const childrenData = {
        vihanna: {
            name: "VIHANNA N", dob: "July 30, 2016", nationality: "Indian", langs: "English & Telugu",
            blood: "B+", allergy: "None", diet: "Vegan", emergencyLabel: "EMERGENCY (Call Dad)",
            phone: "+61 468 467 031", photo: "VihannaId-1.jpg"
        },
        jashnika: {
            name: "JASHNIKA N", dob: "April 10, 2018", nationality: "Indian", langs: "English & Telugu",
            blood: "B+", allergy: "None", diet: "No Red Meat", emergencyLabel: "EMERGENCY (Call Dad)",
            phone: "+61 468 467 031", photo: "JashnikaId-1.jpg"
        }
    };

    function autoFitText(element, maxFontSize) {
        let fontSize = maxFontSize;
        element.style.fontSize = fontSize + "px";
        const containerWidth = element.parentElement.clientWidth - 10;
        while (element.scrollWidth > containerWidth && fontSize > 10) {
            fontSize--;
            element.style.fontSize = fontSize + "px";
        }
    }

    function updateCard(childId) {
        const child = childrenData[childId];
        document.getElementById('card-name').textContent = child.name;
        document.getElementById('card-dob').textContent = child.dob;
        document.getElementById('card-langs').textContent = child.langs;
        document.getElementById('card-blood').textContent = child.blood;
        document.getElementById('card-allergy').textContent = child.allergy;
        document.getElementById('card-emergency-label').textContent = child.emergencyLabel;
        document.getElementById('card-phone').textContent = child.phone;

        const dietEl = document.getElementById('card-diet');
        dietEl.textContent = child.diet;
        const dietValue = child.diet.toLowerCase();
        
        if (dietValue === "vegan") dietEl.style.color = "#2E7D32";
        else if (dietValue === "non-vegetarian") dietEl.style.color = "#C62828";
        else if (dietValue === "no red meat") dietEl.style.color = "#F9A825";
        else dietEl.style.color = "#111";

        autoFitText(dietEl, 38);
        autoFitText(document.getElementById('card-allergy'), 38);
        document.getElementById('card-photo').src = child.photo;
    }

    document.getElementById('childSelect').addEventListener('change', (e) => updateCard(e.target.value));
    window.onload = () => updateCard('vihanna');
</script>

</body>
</html>
