<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Professional Child Safety ID Card</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  body {
    background-color: #f0f2f5;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    font-family: 'Fredoka', sans-serif;
  }

  .print-guide {
    width: 600px; 
    height: 916px; 
    border: 2px dashed #ccc;
    background: #fff;
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
    box-sizing: border-box;
  }

  .id-card {
    width: 540px;
    height: 856px;
    background-color: #ffffff;
    border-radius: 40px;
    overflow: hidden;
    box-shadow: 0 10px 30px rgba(0,0,0,0.15);
    display: flex;
    flex-direction: column;
    position: relative;
    box-sizing: border-box;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }

  /* ── HEADER SECTION ── */
  .header {
    height: 16%; 
    background-color: #0B2D5B;
    position: relative;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    padding-bottom: 25px;
    box-sizing: border-box;
  }

  .red-triangle {
    position: absolute;
    top: 0;
    left: 0;
    width: 0;
    height: 0;
    border-top: 80px solid #C62828;
    border-right: 80px solid transparent;
  }

  .header h1 {
    color: #ffffff;
    font-weight: 600;
    text-transform: uppercase;
    font-size: 49px; /* Increased from 44px by +5 */
    margin: 0;
    letter-spacing: 2px;
  }

  /* ── MAIN BODY SECTION ── */
  .main-body {
    display: flex;
    flex: 1; 
    padding: 25px 20px 10px 20px;
    box-sizing: border-box;
  }

  .left-column {
    width: 70%;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding-right: 15px;
    box-sizing: border-box;
  }

  .left-column img {
    width: 100%;
    height: 100%; 
    object-fit: cover;
    border-radius: 30px;
    background-color: #f0f0f0;
  }

  .right-column {
    width: 30%;
    display: flex;
    flex-direction: column;
    justify-content: space-between; 
    box-sizing: border-box;
  }

  .info-block {
    text-align: center;
  }

  .info-label {
    font-size: 15px;
    font-weight: 500;
    color: #0B2D5B;
    background: #E8EEF5;
    display: inline-block;
    padding: 3px 14px;
    border-radius: 12px;
    margin-bottom: 4px;
  }

  .info-value {
    font-size: 19px;
    font-weight: 600;
    color: #111;
    line-height: 1.2;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .flag-icon {
    width: 22px;
    height: auto;
    border-radius: 2px;
  }

  .divider {
    height: 2px;
    background-color: #9EC3E6;
    margin: 2px auto;
    width: 60%;
    border-radius: 2px;
  }

  /* QR Section */
  .qr-section {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .qr-box {
    width: 135px; 
    height: 135px; 
    display: flex;
    justify-content: center;
    align-items: center;
    box-sizing: border-box;
    margin-top: 4px;
  }

  .qr-box img {
    width: 100%;
    height: 100%;
    border-radius: 12px;
  }

  /* ── MEDICAL & DIET PANEL ── */
  .medical-panel {
    height: 115px; 
    margin: 0 20px 20px 20px;
    border: 3px solid #9EC3E6;
    border-radius: 25px;
    display: flex;
    box-sizing: border-box;
    background-color: #FBFCFE;
    padding-top: 10px;
  }

  .med-column {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start; 
    text-align: center;
    padding-top: 5px;
  }

  .med-divider {
    width: 3px;
    background-color: #9EC3E6;
    height: 70%;
    align-self: center;
    border-radius: 3px;
  }

  .med-label {
    font-size: 16px;
    font-weight: 500;
    color: #666;
    margin-bottom: 4px;
  }

  .med-value {
    font-size: 40px;
    font-weight: 700;
    line-height: 1;
    margin-top: 2px;
  }

  .med-value.blood { color: #C62828; }
  .med-value.allergy { color: #111; }
  .med-value.vegan { color: #2E7D32; }

  /* ── EMERGENCY FOOTER ── */
  .footer {
    height: 16%; 
    background-color: #C62828;
    display: flex;
    align-items: center;
    padding: 0 30px;
    box-sizing: border-box;
    position: relative;
  }

  .phone-icon {
    width: 55px;
    height: 55px;
    background-color: #ffffff;
    border-radius: 18px;
    display: flex;
    justify-content: center;
    align-items: center;
    position: absolute;
    left: 25px;
  }

  .phone-icon svg {
    width: 30px;
    height: 30px;
    fill: #C62828;
  }

  .footer-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    margin-left: 40px;
  }

  .footer-label {
    color: #ffffff;
    font-size: 20px;
    font-weight: 500;
    margin-bottom: 4px;
  }

  .footer-number {
    color: #ffffff;
    font-size: 46px;
    font-weight: 700;
    line-height: 1;
  }
</style>
</head>
<body>

<div class="print-guide">
  <div class="id-card">
    
    <div class="header">
      <div class="red-triangle"></div>
      <h1>VIHANNA N</h1>
    </div>

    <div class="main-body">
      <div class="left-column">
        <img src="VihannaId-1.jpg" alt="Vihanna">
      </div>

      <div class="right-column">
        <div class="info-block">
          <div class="info-label">Born On</div>
          <div class="info-value">JUL 30, 2016</div>
        </div>

        <div class="divider"></div>

        <div class="info-block">
          <div class="info-label">Nationality</div>
          <div class="info-value">
            Indian 
            <img class="flag-icon" src="https://upload.wikimedia.org/wikipedia/en/4/41/Flag_of_India.svg" alt="India Flag">
          </div>
        </div>

        <div class="divider"></div>

        <div class="info-block">
          <div class="info-label">Languages</div>
          <div class="info-value">English & Telugu</div>
        </div>

        <div class="qr-section">
          <div class="info-label">Scan, if I am lost</div>
          <div class="qr-box">
            <img src="qr-code.png" alt="QR Code">
          </div>
        </div>
      </div>
    </div>

    <div class="medical-panel">
      <div class="med-column">
        <div class="med-label">Blood Type</div>
        <div class="med-value blood">B+</div>
      </div>
      <div class="med-divider"></div>
      <div class="med-column">
        <div class="med-label">Allergy</div>
        <div class="med-value allergy">None</div>
      </div>
      <div class="med-divider"></div>
      <div class="med-column">
        <div class="med-label">Diet</div>
        <div class="med-value vegan">Vegan</div>
      </div>
    </div>

    <div class="footer">
      <div class="phone-icon">
        <svg viewBox="0 0 24 24">
          <path d="M20.01 15.38c-1.23 0-2.42-.2-3.53-.56a.977.977 0 00-1.01.24l-1.57 1.97c-2.83-1.35-5.48-3.9-6.89-6.83l1.95-1.66c.27-.28.35-.67.24-1.02-.37-1.11-.56-2.3-.56-3.53 0-.54-.45-.99-.99-.99H4.19C3.65 3 3 3.24 3 3.99 3 13.28 10.73 21 20.01 21c.71 0 .99-.63.99-1.18v-3.45c0-.54-.45-.99-.99-.99z"/>
        </svg>
      </div>
      <div class="footer-content">
        <div class="footer-label">EMERGENCY (Call Dad)</div>
        <div class="footer-number">+61 468 467 031</div>
      </div>
    </div>

  </div>
</div>

</body>
</html>
